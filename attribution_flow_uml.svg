 ry="12.5" style="stroke:#000;stroke-width:.5"/><text x="1021.3" y="604.3" font-family="Arial" font-size="16" textLength="187.2">4. Запрашивает у SRN</text><text x="1021.3" y="622.9" font-family="Arial" font-size="16" textLength="220.9">подтверждение и данные</text><text x="1021.3" y="641.5" font-family="Arial" font-size="16" textLength="157.2">о кликах / показах</text><rect width="286.9" height="38.6" x="988.4" y="752.5" fill="#fff" rx="12.5" ry="12.5" style="stroke:#000;stroke-width:.5"/><text x="998.4" y="777.4" font-family="Arial" font-size="16" textLength="266.9">Получает результат атрибуции</text><rect width="251.7" height="57.3" x="1005.9" y="811.1" fill="#fff" rx="12.5" ry="12.5" style="stroke:#000;stroke-width:.5"/><text x="1015.9" y="836" font-family="Arial" font-size="16" textLength="214.2">5. Возвращает результат</text><text x="1015.9" y="854.6" font-family="Arial" font-size="16" textLength="231.7">атрибуции сервису аренды</text><path d="M982.4 12.3v975.3m578.5-975.3v975.3" style="stroke:#000;stroke-width:1.5"/><path d="M154.3 55.9v20m-4-10 4 10 4-10-4 4zm648 339v20m-4-10 4 10 4-10-4 4zm4 530.7v20m-4-10 4 10 4-10-4 4zm337.5-396.2v20m-4-10 4 10 4-10-4 4zm4 221.7v20m-4-10 4 10 4-10-4 4zM154.3 114.5v5m0 0h298.6m0 0v15m-4-10 4 10 4-10-4 4zm4 67.3v5m0 0H154.3m0 0v15m-4-10 4 10 4-10-4 4zm4 85.8v5m0 0h298.6m0 0v15m-4-10 4 10 4-10-4 4zm4 48.7v5m0 0h345.4m0 0v15m-4-10 4 10 4-10-4 4zm4 125.8v5m0 0h333.5m0 0v15m-4-10 4 10 4-10-4 4zm4 163.2v5m0 0H452.9m0 0v15m-4-10 4 10 4-10-4 4zm4 67.2v5m0 0h678.9m0 0v15m-4-10 4 10 4-10-4 4zm4 125.9v5m0 0H798.3m0 0v15m-4-10 4 10 4-10-4 4z" style="stroke:#000;stroke-width:1"/><text x="94.4" y="27.1" font-family="Arial" font-size="16" textLength="117.8">Пользователь</text><text x="299.3" y="27.1" font-family="Arial" font-size="16" textLength="305.4">Рекламная сеть / источник трафика</text><text x="672.5" y="27.1" font-family="Arial" font-size="16" textLength="249.6">Приложение / сервис аренды</text><text x="1253" y="27.1" font-family